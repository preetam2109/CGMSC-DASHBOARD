<div class="container-fluid mt-3">
  <!-- Nav tabs -->
  <ul class="nav nav-tabs" id="qcLabTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link" [class.active]="activeTab === 'tab1'" (click)="setActiveTab('tab1')" type="button" role="tab">
        Current Sample Status & TAT Monitoring
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" [class.active]="activeTab === 'tab2'" (click)="setActiveTab('tab2')" type="button" role="tab">
        Empaneled Lab Performance
      </button>
    </li>
  </ul>

  <!-- Tab panes -->
  <div class="tab-content border-start border-end border-bottom p-3 bg-white" id="qcLabTabContent">
    <div class="tab-pane fade" [class.show]="activeTab === 'tab1'" [class.active]="activeTab === 'tab1'" role="tabpanel" *ngIf="activeTab === 'tab1'">
      <app-current-sample-status-tatmonitoring></app-current-sample-status-tatmonitoring>
    </div>
    <div class="tab-pane fade" [class.show]="activeTab === 'tab2'" [class.active]="activeTab === 'tab2'" role="tabpanel" *ngIf="activeTab === 'tab2'">
      <app-qcsample-tracking-under-empanelled-lab></app-qcsample-tracking-under-empanelled-lab>
    </div>
  </div>
</div>
