<div class="inter-warehouse-wrapper">
  
  <!-- Spinner -->
  <div *ngIf="loading" class="inter-warehouse-spinner-overlay">
    <div class="inter-warehouse-spinner"></div>
    <div class="inter-warehouse-spinner-text">
      Please wait while we load the data...
    </div>
  </div>

  <!-- Iframe -->
  <iframe
    class="oac_embedding_iframe"
    style="height: 100vh; width:100%; border: none;"
    srcdoc='
    <!DOCTYPE html>
    <html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>QC Batches Report Summary</title>
        <script src="https://cgmscanalytics-cgmscee-bo.analytics.ocp.oraclecloud.com/public/dv/v1/embedding/standalone/embedding.js" type="application/javascript"></script>
        <script>
          var token = "";

          function fetchAndSetToken() {
            fetch("https://kcthepe5e6xwemxr36bzoz4xgq.apigateway.ap-mumbai-1.oci.customer-oci.com/oac/auth_token")
              .then(response => {
                if (!response.ok) {
                  throw new Error("HTTP error! status:"+response.status);
                }
                return response.json();
              })
              .then(data => {
                token = data.access_token;

                requirejs(["jquery", "knockout", "obitech-application/application","ojs/ojcore", "ojs/ojknockout", "ojs/ojcomposite", "jet-composites/oracle-dv/loader"], 
                function($, ko, application) {
                  application.setSecurityConfig("token", {
                    tokenAuthFunction: function() {
                      return token;
                    }
                  });

                  if (!window.bindingsApplied) {
                    function MyProject() {
                      var self = this;
                      self.projectPath = ko.observable("/@Catalog/users/sm.cgmsc@gmail.com/QC_Batches");
                    }
                    ko.applyBindings(new MyProject());
                    window.bindingsApplied = true;
                    
                    // Send message to parent window (Angular component) that OAC is loaded
                    setTimeout(function() {
                      window.parent.postMessage("OAC_LOADED", "*");
                    }, 3000);
                  }
                });
              })
              .catch(error => {
                console.error("Error fetching token:", error);
              });
          }

          fetchAndSetToken();
          setInterval(fetchAndSetToken, 45 * 60 * 1000);
        </script>
    </head>
    <body>
        <div style="width: 100%; height: 100vh;">
          <oracle-dv 
          project-path="[[projectPath]]" 
          active-page="insight" 
          active-tab-id="snapshot!canvas!1"
          project-options=&apos;{"bShowFilterBar":false}&apos;>
          </oracle-dv>
        </div>
    </body>
    </html>
'>
  </iframe>

</div>
